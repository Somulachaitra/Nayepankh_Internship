<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volunteer Login | NayePankh Foundation</title>
  <meta name="description" content="Sign in to your NayePankh Foundation volunteer account." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/admin.css" />
  <link rel="icon" type="image/png" href="../images/logo.svg.png" />
</head>
<body>

  <header class="header">
    <div class="container">
      <nav class="nav">
        <a href="../index.html" class="nav-logo">
          <img src="https://assets.zyrosite.com/cdn-cgi/image/format=auto,w=375,fit=crop,q=95/YKbL494Mv8Ip3qgy/logo-AVLW2LLWZkI8v845.png" alt="Logo" />
          <span>NayePankh</span>
        </a>
        <ul class="nav-menu">
          <li><a href="../index.html" class="nav-link">Home</a></li>
          <li><a href="volunteer-register.html" class="nav-link">Register</a></li>
          <li><a href="volunteer-login.html" class="nav-link active">Login</a></li>
          <li><a href="admin/admin-login.html" class="nav-link">⚙️ Admin</a></li>
        </ul>
        <div class="nav-actions">
          <button class="theme-toggle" aria-label="Toggle theme">
            <svg class="moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg class="sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </button>
        </div>
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <img src="../images/logo.svg.png" alt="Logo" class="logo" />
        <h1>Welcome <span class="gradient-text">back</span></h1>
        <p>Sign in to your volunteer account</p>
      </div>

      <!-- Login form -->
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" name="email" required placeholder="you@example.com" autofocus />
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="password-wrapper">
            <input type="password" class="form-input" name="password" required placeholder="Your password" id="passwordInput" />
            <button type="button" class="password-toggle" onclick="togglePassword('passwordInput', this)">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <label style="display: flex; align-items: center; gap: 8px; font-size: 0.88rem; cursor: pointer;">
            <input type="checkbox" name="remember" style="accent-color: var(--primary);" />
            Remember me
          </label>
          <a href="#" id="forgotPassword" style="font-size: 0.88rem; color: var(--primary); font-weight: 600;">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;" id="loginBtn">
          Sign In →
        </button>

        <div class="auth-divider">or continue with</div>

        <div class="social-auth">
          <button type="button" class="social-btn" onclick="window.NPAuth.signInWithGoogle()">
            <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Google
          </button>
          <button type="button" class="social-btn" onclick="window.NPAuth.signInWithGitHub()">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0012 2z"/></svg>
            GitHub
          </button>
        </div>

        <button type="button" class="social-btn" style="width: 100%; margin-top: 12px;" onclick="sendMagicLink()">
          ✨ Send me a magic link instead
        </button>
      </form>

      <!-- Forgot password form (hidden by default) -->
      <form id="resetForm" style="display: none;">
        <p style="color: var(--text-muted); margin-bottom: 20px; font-size: 0.95rem;">
          Enter your email and we'll send you a reset link.
        </p>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" name="email" required placeholder="you@example.com" />
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 12px;">
          Send Reset Link
        </button>
        <button type="button" class="btn btn-secondary" style="width: 100%;" onclick="showLogin()">
          ← Back to sign in
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="volunteer-register.html">Create one</a>
      </div>
    </div>
  </main>

  <script src="../js/main.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    function togglePassword(id, btn) {
      const input = document.getElementById(id);
      const isPwd = input.type === 'password';
      input.type = isPwd ? 'text' : 'password';
      btn.innerHTML = isPwd
        ? '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24M1 1l22 22"/></svg>'
        : '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    }

    function showToast(message, type = 'info') {
      let container = document.querySelector('.toast-container');
      if (!container) {
        container = document.createElement('div');
        container.className = 'toast-container';
        document.body.appendChild(container);
      }
      const t = document.createElement('div');
      t.className = `toast-notif ${type}`;
      const icons = { success: '✓', error: '✕', warning: '!', info: 'ℹ' };
      t.innerHTML = `<div class="icon">${icons[type] || icons.info}</div><div>${message}</div>`;
      container.appendChild(t);
      setTimeout(() => {
        t.style.opacity = '0';
        t.style.transform = 'translateX(120%)';
        setTimeout(() => t.remove(), 300);
      }, 3500);
    }

    function showReset() {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('resetForm').style.display = 'block';
    }
    function showLogin() {
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('resetForm').style.display = 'none';
    }

    document.getElementById('forgotPassword').addEventListener('click', (e) => {
      e.preventDefault();
      showReset();
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target));
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Signing in...';

      try {
        await window.NPAuth.signIn(data);
        showToast('🎉 Welcome back! Redirecting...', 'success');
        setTimeout(() => {
          window.location.href = AUTH_CONFIG.redirectAfterLogin;
        }, 1000);
      } catch (err) {
        showToast(err.message || 'Invalid credentials', 'error');
        btn.disabled = false;
        btn.innerHTML = 'Sign In →';
      }
    });

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target));
      try {
        await window.NPAuth.resetPassword(data.email);
        showToast('📧 Reset link sent! Check your inbox.', 'success');
        setTimeout(showLogin, 2000);
      } catch (err) {
        showToast(err.message || 'Could not send reset email', 'error');
      }
    });

    async function sendMagicLink() {
      const email = prompt('Enter your email to receive a magic sign-in link:');
      if (!email) return;
      try {
        await window.NPAuth.signInWithMagicLink(email);
        showToast('📧 Magic link sent! Check your email.', 'success');
      } catch (err) {
        showToast(err.message || 'Could not send magic link', 'error');
      }
    }

    // Handle password reset callback
    if (window.location.search.includes('reset=1')) {
      showToast('Enter your new password below', 'info');
      showReset();
    }

    // Auto-redirect if already logged in
    if (window.NPAuth.isLoggedIn()) {
      window.location.href = AUTH_CONFIG.redirectAfterLogin;
    }
  </script>
</body>
</html>
